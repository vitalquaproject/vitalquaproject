<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="Vitalqua Project logo">
  <title>Vitalqua Project</title>
  <!--
    A standard water-drop silhouette with eight triangular sun rays
    radiating around it — matching the sun icon in the landing hero.
  -->

  <!-- Sun rays — 8 triangular rays, 45° apart, amber -->
  <g fill="#FFD34E">
    <polygon points="24,2 22.2,8 25.8,8"/>
    <polygon points="24,2 22.2,8 25.8,8" transform="rotate(45 24 24)"/>
    <polygon points="24,2 22.2,8 25.8,8" transform="rotate(90 24 24)"/>
    <polygon points="24,2 22.2,8 25.8,8" transform="rotate(135 24 24)"/>
    <polygon points="24,2 22.2,8 25.8,8" transform="rotate(180 24 24)"/>
    <polygon points="24,2 22.2,8 25.8,8" transform="rotate(225 24 24)"/>
    <polygon points="24,2 22.2,8 25.8,8" transform="rotate(270 24 24)"/>
    <polygon points="24,2 22.2,8 25.8,8" transform="rotate(315 24 24)"/>
  </g>

  <!-- Water drop — classic teardrop centred within the ring of rays -->
  <path d="M24,8 C32,18 36,26 36,30 C36,36 31,40 24,40 C17,40 12,36 12,30 C12,26 16,18 24,8 Z"
        fill="#2A85B3"/>
</svg>
